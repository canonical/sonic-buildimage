project: dockers
environment:
  PROJECT_PATH: /sonic-buildimage/dockers
  TESTSLIB: $PROJECT_PATH/tests/
backends:
  lxd:
    systems: [ubuntu-24.04]

include:
  - dockers/
  - files/

suites:
  dockers/:
    summary: Check rocks running
    prepare: |
      echo "Preparing dockers suite..."
      . "$TESTSLIB"/utils.sh
      prepare_environment
    restore: |
      echo "Restoring dockers suite"
    kill-timeout: 10m

path: /sonic-buildimage/