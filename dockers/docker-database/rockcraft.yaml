name: docker-database
summary: SONiC database container
description: A Chiselled rock for SONiC database container
version: "1.0.0"

# Use a "bare" base for an even smaller rock
base: bare

# Meeting requirement R1 by making sure the rock builds on Jammy
build-base: ubuntu@24.04

license: Apache-2.0

# Target architecture is amd64
platforms:
  amd64:  # Make sure this value matches your computer's architecture

# TODO: use _daemon_ user instead of root
# run-user: _daemon_
services:
   supervisor:
     command: "/usr/local/bin/docker-database-init.sh"
     startup: enabled
     override: replace
     on-failure: shutdown 

# For meeting requirement R2, simply don't specify any entrypoint (aka "services")

parts:
  install-libyang_1.0.73_amd64:
    plugin: dump
    source-type: deb
    source: ./debs/libyang_1.0.73_amd64.deb

  install-libswsscommon_1.0.0_amd64:
    plugin: dump
    source-type: deb
    source: ./debs/libswsscommon_1.0.0_amd64.deb

  install-libyang-cpp_1.0.73_amd64:
    plugin: dump
    source-type: deb
    source: ./debs/libyang-cpp_1.0.73_amd64.deb

  install-python3-yang_1.0.73_amd64:
    plugin: dump
    source-type: deb
    source: ./debs/python3-yang_1.0.73_amd64.deb 

  install-python3-swsscommon_1.0.0_amd64:
    plugin: dump
    source-type: deb
    source: ./debs/python3-swsscommon_1.0.0_amd64.deb

  install-sonic-db-cli_1.0.0_amd64:
    plugin: dump
    source-type: deb
    source: ./debs/sonic-db-cli_1.0.0_amd64.deb

  install-sonic-eventd_1.0.0-0_amd64:
    plugin: dump
    source-type: deb
    source: ./debs/sonic-eventd_1.0.0-0_amd64.deb

  install-libdashapi_1.0.0_amd64:
    plugin: dump
    source-type: deb
    source: ./debs/libdashapi_1.0.0_amd64.deb

  install-packages:
      plugin: nil
      # stage-packages:
      #       - base-files_base
      #       - core-utils_bins
      #       - base-files_release-info
      #       - base-files_chisel
      #       - rsyslog_bins
      #       - redis-server_bins
      #       - iproute2_bins
      #       - libhiredis1.1.0_libs
      #       - libzmq5_libs
      #       - libboost-serialization1.83.0_libs
      #       - libpcre3_libs
      #       - libnl-cli-3-200_libs
      source: https://github.com/jy5275/chisel-releases.git
      source-type: git
      source-branch: dev/docker-database
      override-build: |
        chisel cut --release ./ --root ${CRAFT_PART_INSTALL} \
            base-files_release-info \
            coreutils_bins \
            iproute2_bins \
            gawk_bins \
            bash_bins \
            rsyslog_bins \
            redis-server_bins \
            libhiredis1.1.0_libs \
            libzmq5_libs \
            libboost-serialization1.83.0_libs \
            libpcre3_libs \
            libnl-cli-3-200_libs
        ln -sf /usr/bin/gawk ${CRAFT_PART_INSTALL}/usr/bin/awk
  
  install-python:
    plugin: nil
    source: .
    stage-packages:
      - python3.12-venv_ensurepip
    override-build: |
      ln -sf /usr/bin/python3.12 ${CRAFT_PART_INSTALL}/usr/bin/python3
      pip3 install --upgrade -t ${CRAFT_PART_INSTALL} \
        ./python-wheels/sonic_py_common-1.0-py3-none-any.whl \
        ./python-wheels/sonic_yang_mgmt-1.0-py3-none-any.whl \
        ./python-wheels/sonic_yang_models-1.0-py3-none-any.whl \
        ./python-wheels/sonic_containercfgd-1.0-py3-none-any.whl \
        ./python-wheels/sonic_config_engine-1.0-py3-none-any.whl \
        jinjanator \
        click \
        supervisor \
        supervisord-dependent-startup \
        lxml
    organize:
      bin/supervisord: usr/local/bin/supervisord

  install-common-files:
    plugin: dump
    source: .
    source-type: local
    after: [install-packages, install-python]
    organize:
      critical_processes.j2: usr/share/sonic/templates/critical_processes.j2
      database_config.json.j2: usr/share/sonic/templates/database_config.json.j2
      database_global.json.j2: usr/share/sonic/templates/database_global.json.j2
      docker-database-init.sh: usr/local/bin/docker-database-init.sh
      files/00-load-omprog.conf: etc/rsyslog.d/00-load-omprog.conf
      files/container_startup.py: usr/share/sonic/scripts/container_startup.py
      files/readiness_probe.sh: usr/bin/readiness_probe.sh
      files/supervisord.conf: etc/supervisor/supervisord.conf
      files/swss_vars.j2: usr/share/sonic/templates/swss_vars.j2
      files/sysctl-net.conf: etc/sysctl.d/sysctl-net.conf
      files/update_chassisdb_config: usr/local/bin/update_chassisdb_config
      flush_unused_database: usr/local/bin/flush_unused_database
      supervisor-proc-exit-listener: usr/bin/supervisor-proc-exit-listener
      supervisord.conf.j2: usr/share/sonic/templates/supervisord.conf.j2
    stage:
      - usr/
      - etc/
    override-prime: |
      craftctl default
      cp ${CRAFT_PROJECT_DIR}/redis.conf etc/redis/
      cp ${CRAFT_PROJECT_DIR}/files/rsyslog.conf etc/rsyslog.conf
