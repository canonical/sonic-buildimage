      #     testflinger results ${{ steps.submit-job.outputs.id }}

      # - name: Upload vs image
      #   uses: actions/upload-artifact@master
      #   with:
      #     name: sonic-vs.img.gz
      #     path: target/sonic-vs.img.gz
