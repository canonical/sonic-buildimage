name: Build SONiC target

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'branch name'
        required: true
        default: 'tests/vs-t0'
        type: string
  push:
    branches: [ tests/vs-t0 ]

jobs:
  testflinger-build:
    runs-on: [self-hosted, testflinger]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Submit job
        id: submit-job
        uses: canonical/testflinger/.github/actions/submit@main
        with:
          poll: true
          job: |
            job_queue: torchtusk
            provision_data:
              distro: jammy
            test_data:
              test_cmds: |
                ssh ubuntu@$DEVICE_IP git clone -b feature_noble_build --recurse-submodules https://github.com/canonical/sonic-buildimage.git
                ssh ubuntu@$DEVICE_IP sudo modprobe overlay
                ssh ubuntu@$DEVICE_IP sudo apt update
                ssh ubuntu@$DEVICE_IP sudo apt install -y python3 python-is-python3 docker.io python3-pip curl j2cli make apt-transport-https ca-certificates gnupg-agent software-properties-common docker-buildx
                ssh ubuntu@$DEVICE_IP pip3 install --user j2cli --break-system-packages
                ssh ubuntu@$DEVICE_IP pip3 install --user jinjanator --break-system-packages
                ssh ubuntu@$DEVICE_IP sudo gpasswd -a ubuntu docker
                ssh ubuntu@$DEVICE_IP sudo systemctl restart docker
                ssh ubuntu@$DEVICE_IP sudo chmod a+rw /var/run/docker.sock
                ssh ubuntu@$DEVICE_IP "cd /home/ubuntu/sonic-buildimage && make init"
                ssh ubuntu@$DEVICE_IP "cd /home/ubuntu/sonic-buildimage && make configure PLATFORM=vs"
                for i in {1..3}; do ssh ubuntu@$DEVICE_IP "cd /home/ubuntu/sonic-buildimage && make SONIC_BUILD_JOBS=4 target/sonic-vs.img.gz" && break; echo "Attempt $i failed. Retrying..."; done

      # - name: Display results
