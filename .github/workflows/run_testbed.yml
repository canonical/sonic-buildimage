name: SONiC testbed

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'branch name'
        required: true
        default: 'feature_noble_build'
        type: string
  push:
    branches: [ feature_noble_build, test/*, tests/* ]

jobs:
  testflinger-vs:
    runs-on: [self-hosted , testflinger]
    timeout-minutes: 1440   # Time limit for this GitHub workflow job (not testflinger job!): 24 hours
    steps:
      - uses: actions/checkout@v4

      - name: Generate job YAML
        uses: cuchi/jinja2-action@v1.3.0
        with:
          template: ${{ github.workspace }}/.github/testflinger/vs_build_run.yaml.j2
          output_file: tmp_build_vs.yaml
          strict: true
          variables: |
            branch=${{ github.head_ref || github.ref_name }}

      - name: Check job yaml
        run: |
          # Copy to solve the file permission issue
          cp tmp_build_vs.yaml build_vs.yaml
          ls -al build_vs.yaml
          cat build_vs.yaml

      - name: Submit job
        id: submit-job
        uses: canonical/testflinger/.github/actions/submit@main
        with:
          poll: true
          job-path: build_vs.yaml

      - name: Display results
        id: get-results
        run: |
          testflinger results ${{ steps.submit-job.outputs.id }} > results.json
          cat results.json

      - name: Check test status
        run: |
          set -e
          testflinger results ${{ steps.submit-job.outputs.id }} > results.json
          status=$(jq '.test_status' results.json)
          if ! [[ "$status" =~ ^[0-9]+$ ]]; then
            echo "Invalid or missing test_status in results.json"
            exit 1
          fi
          if [ "$status" -ne 0 ]; then
              echo "testflinger task failed with status $status"
              jq -r '.test_output' results.json
              exit 1
          else
              echo "testflinger task succeeded"
          fi


  testflinger-broadcom:
    runs-on: [self-hosted , testflinger]
    steps:
      - uses: actions/checkout@v4

      - name: Generate job YAML
        uses: cuchi/jinja2-action@v1.3.0
        with:
          template: ${{ github.workspace }}/.github/testflinger/broadcom_install.yaml.j2
          output_file: tmp_broadcom_install.yaml
          strict: true
          variables: |
            branch=${{ github.head_ref || github.ref_name }}

      - name: Check job yaml
        run: |
          # Copy to solve the file permission issue
          cp tmp_broadcom_install.yaml broadcom_install.yaml
          ls -al broadcom_install.yaml
          cat broadcom_install.yaml

      - name: Submit job
        id: submit-job
        uses: canonical/testflinger/.github/actions/submit@main
        with:
          poll: true
          job-path: broadcom_install.yaml

      - name: Display results
        id: get-results
        run: |
          testflinger results ${{ steps.submit-job.outputs.id }} > results.json
          cat results.json

      - name: Check build job status
        run: |
          set -e
          testflinger results ${{ steps.submit-job.outputs.id }} > results.json
          status=$(jq '.test_status' results.json)
          if ! [[ "$status" =~ ^[0-9]+$ ]]; then
            echo "Invalid or missing test_status in results.json"
            exit 1
          fi
          if [ "$status" -ne 0 ]; then
              echo "testflinger task failed with status $status"
              jq -r '.test_output' results.json
              exit 1
          else
              echo "testflinger task succeeded"
          fi
