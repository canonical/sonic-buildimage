# GCC 15 defaults to C23, which breaks SONiC's K&R prototypes and promotes
# several warnings to errors. Pin dpkg-buildpackage builds back to the gnu17
# baseline SONiC targets and relax the new -Werror= promotions.
APPEND CFLAGS -std=gnu17 -Wno-error=incompatible-pointer-types -Wno-error=int-conversion -Wno-error=discarded-qualifiers
